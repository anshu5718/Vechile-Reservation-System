{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>{% block title %}Sawari{% endblock %}</title>

    {% block tailwind_css %}
    {% tailwind_css %}
    {% endblock %}
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar bg-base-100 shadow-sm flex justify-between px-4 md:px-8">
      <!-- Logo -->
      <div class="flex-1">
        <a class="btn btn-ghost text-xl font-bold">SAWARI</a>
      </div>

      <!-- Search & User -->
      <div class="flex items-center gap-2">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="text-xl">
          <!-- Sun icon (light mode) -->
          <svg
            id="sun-icon"
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <path
              d="M12 1v2m0 18v2m11-11h-2M3 12H1m16.95-6.95-1.41 1.41M6.46 17.54l-1.41 1.41m12.9 0-1.41-1.41M6.46 6.46 5.05 5.05"
            />
          </svg>

          <!-- Moon icon (dark mode) -->
          <svg
            id="moon-icon"
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6 hidden"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              d="M21 12.79A9 9 0 0 1 11.21 3c0-.34.04-.68.07-1.01a9 9 0 1 0 9.72 10.8z"
            />
          </svg>
        </button>

        <!-- Search Input -->
        <input
          type="text"
          placeholder="Search"
          class="input input-bordered w-full md:w-40 lg:w-60"
        />

        <!-- Avatar Dropdown -->
        <div class="dropdown dropdown-end">
          <label tabindex="0" class="btn btn-ghost btn-circle avatar">
            <div class="w-10 rounded-full">
              <img
                src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp"
                alt="Profile"
              />
            </div>
          </label>
          <ul
            tabindex="0"
            class="dropdown-content menu p-2 shadow bg-base-100 rounded-box w-52 mt-4"
          >
            <li><a href="#">Profile</a></li>
            <li><a href="#">Settings</a></li>
            <li><a href="#">Logout</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="p-4 md:p-8">
      {% block content %}
      <!-- Page-specific content goes here -->
      {% endblock %}
    </main>

    <!-- Theme Toggle Script -->
    <script>
      const htmlEl = document.documentElement;
      const sunIcon = document.getElementById("sun-icon");
      const moonIcon = document.getElementById("moon-icon");
      const themeToggle = document.getElementById("theme-toggle");

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "light";
      htmlEl.setAttribute("data-theme", savedTheme);
      if (savedTheme !== "light") {
        sunIcon.classList.add("hidden");
        moonIcon.classList.remove("hidden");
      }

      // Toggle theme
      themeToggle.addEventListener("click", () => {
        const currentTheme = htmlEl.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light"; // or "synthwave"
        htmlEl.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);

        sunIcon.classList.toggle("hidden");
        moonIcon.classList.toggle("hidden");
      });
    </script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
